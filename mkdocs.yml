site_name: 상품 구매 가이드
site_url: https://buysense.github.io/product-research-wiki/
site_description: AI가 분석한 상품 구매 가이드 모음
site_author: product-research-bot

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환

plugins:
  - search:
      lang: ja  # 한국어와 가장 유사한 CJK 지원

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - 홈: index.md
  - 상품 리뷰:
    - 하네야 준마이 긴죠 키라비 나마겐슈: products/하네야-준마이-긴죠-키라비-나마겐슈.md
    - 센킨 클래식 니시키 오리가라미: products/센킨-클래식-니시키-오리가라미.md
    - 잔스포츠 빅스튜던트 백팩 EK0A5BAHN541: products/잔스포츠-빅스튜던트-백팩-ek0a5bahn541.md
    - 잔스포츠 슈퍼브레이크 원 백팩 EK0A5BAGN551: products/잔스포츠-슈퍼브레이크-원-백팩-ek0a5bagn551.md
    - LG전자 퓨리케어 360도 Hit 공기청정기 62㎡: products/lg전자-퓨리케어-360도-hit-공기청정기-62.md
    - 위닉스 타워 엣지 컴팩트 공기청정기 19.8: products/위닉스-타워-엣지-컴팩트-공기청정기-198.md
    - 잔스포츠 Drawsack 드로우 짐색 미니 백팩: products/잔스포츠-drawsack-드로우-짐색-미니-백팩.md
    - 다이슨 빅 + 콰이엇 공기청정기 BP04: products/다이슨-빅--콰이엇-공기청정기-bp04.md
    - 샤오미 미지아 공기청정기 5: products/샤오미-미지아-공기청정기-5.md
    - 샤오미 미지아 공기 청정기 4 프로 화이트: products/샤오미-미지아-공기-청정기-4-프로-화이트.md
    - 다이슨 허쉬젯 컴팩트 공기청정기: products/다이슨-허쉬젯-컴팩트-공기청정기.md
    - 디어스킨 에어엠보 날개형 생리대: products/디어스킨-에어엠보-날개형-생리대.md
    - 에어팟 프로 2: products/에어팟-프로-2.md
  - 구매 가이드:
    - 백팩 구매 가이드: guides/백팩.md
  - 카테고리별 비교:
    - 백팩 비교: categories/백팩.md
    - 공기청정기 비교: categories/공기청정기.md
