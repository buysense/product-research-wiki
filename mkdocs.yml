site_name: 상품 구매 가이드
site_url: https://buysense.app/
site_description: AI가 분석한 상품 구매 가이드 모음
site_author: product-research-bot

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환

extra:
  analytics:
    provider: google
    property: G-LS8MS30RDH

